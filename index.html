<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innløst med kjærlighet</title>
<!-- ================================================================
     MINNESIDE – erstatter index.html etter at sjekken er innløst.
     QR-koden på kortet peker hit for alltid.

     To moduser:
     1) omdirigerTil = ""  -> viser minnesiden under
     2) omdirigerTil = "https://..." -> sender den som skanner rett
        videre dit (f.eks. bryllupsbilde-album, spilleliste, video)
     ================================================================ -->
<script>
const CONFIG = {
  mottaker: "Marie & Christian",
  avsender: "Said, June & Sara",
  bryllupsdato: "2026-07-11",        // ISO-format, brukes til telleren
  datoVisning: "11.07.2026",
  hilsen: "Denne sjekken ble innløst med kjærlighet. Kortet den satt på er nå offisielt pynt – men lykken varer.",
  omdirigerTil: ""                   // sett en URL her for å sende videre i stedet
};
if (CONFIG.omdirigerTil) location.replace(CONFIG.omdirigerTil);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Courier+Prime&family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root {
    --papir: #fdfaf2;
    --papir-kant: #efe7d3;
    --blekk: #1d4f4a;
    --blekk-lys: #3a7a72;
    --gull: #b6922e;
    --tekst: #2b2b28;
    --stempel: #b03a36;
    --bakgrunn: #123734;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bakgrunn);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.06), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(182,146,46,0.10), transparent 55%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 48px;
    font-family: 'Cormorant Garamond', serif;
    color: var(--tekst);
  }

  .intro {
    color: #e9e2cf;
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .intro .eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gull);
    display: block;
    margin-bottom: 10px;
  }
  .intro h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 600;
    font-style: italic;
  }

  .sjekk-wrap { perspective: 1200px; width: 100%; max-width: 620px; }

  .sjekk {
    position: relative;
    background: var(--papir);
    border: 1px solid var(--papir-kant);
    border-radius: 6px;
    padding: 26px 30px 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.45), 0 2px 0 rgba(255,255,255,0.15) inset;
    overflow: hidden;
    animation: land 0.9s cubic-bezier(.2,.8,.25,1) both;
  }
  @keyframes land {
    from { opacity: 0; transform: rotateX(18deg) translateY(40px); }
    to   { opacity: 1; transform: rotateX(0) translateY(0); }
  }

  .sjekk::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-radial-gradient(circle at 0% 50%, transparent 0 9px, rgba(29,79,74,0.05) 9px 10px),
      repeating-radial-gradient(circle at 100% 50%, transparent 0 9px, rgba(29,79,74,0.05) 9px 10px);
    pointer-events: none;
  }

  .sjekk-topp {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid var(--blekk);
    padding-bottom: 10px;
    margin-bottom: 18px;
  }
  .bank-navn { font-weight: 700; font-size: 20px; color: var(--blekk); letter-spacing: 1px; }
  .bank-navn small {
    display: block;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--blekk-lys);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .sjekk-nr {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--blekk-lys);
    text-align: right;
  }

  .linje { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .linje .etikett {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blekk-lys);
    white-space: nowrap;
  }
  .linje .verdi {
    flex: 1;
    border-bottom: 1px solid rgba(29,79,74,0.4);
    font-size: 22px;
    font-weight: 600;
    padding: 0 4px 2px;
  }

  .signatur { text-align: center; margin-top: 10px; }
  .signatur .navn {
    font-family: 'Sacramento', cursive;
    font-size: 34px;
    color: var(--blekk);
    transform: rotate(-3deg);
    display: inline-block;
    margin-bottom: -6px;
  }
  .signatur .strek {
    border-top: 1px solid rgba(29,79,74,0.4);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blekk-lys);
    padding-top: 4px;
    max-width: 280px;
    margin: 0 auto;
  }

  .micr {
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--blekk);
    margin-top: 18px;
    text-align: center;
    opacity: 0.85;
    user-select: none;
  }

  /* Permanent stempel */
  .stempel {
    position: absolute;
    top: 46%; left: 50%;
    font-family: 'Courier Prime', monospace;
    font-size: clamp(38px, 9vw, 58px);
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--stempel);
    border: 5px solid var(--stempel);
    border-radius: 8px;
    padding: 6px 22px;
    text-transform: uppercase;
    opacity: 0.85;
    pointer-events: none;
    transform: translate(-50%, -50%) rotate(-12deg);
    mix-blend-mode: multiply;
    z-index: 5;
  }

  .teller {
    margin-top: 30px;
    text-align: center;
    color: #e9e2cf;
    max-width: 620px;
  }
  .teller .tall {
    font-size: clamp(44px, 10vw, 68px);
    font-weight: 700;
    color: var(--gull);
    line-height: 1.1;
  }
  .teller .tekst {
    font-size: 20px;
    font-style: italic;
    margin-top: 4px;
  }
  .teller .hilsen {
    font-size: 18px;
    margin-top: 18px;
    color: rgba(233,226,207,0.8);
    line-height: 1.5;
  }
  .teller .jubileum {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gull);
    margin-top: 16px;
  }

  @media (prefers-reduced-motion: reduce) {
    .sjekk { animation: none; }
  }

  @media (max-width: 480px) {
    .sjekk { padding: 20px 16px 16px; }
    .linje .verdi { font-size: 18px; }
    .micr { font-size: 12px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="intro">
  <span class="eyebrow">Fra arkivet i SolaBanken</span>
  <h1>Denne sjekken er innløst</h1>
</div>

<div class="sjekk-wrap">
  <div class="sjekk">
    <div class="sjekk-topp">
      <div class="bank-navn">
        SolaBanken
        <small>Avd. Skadberg &middot; arkivert</small>
      </div>
      <div class="sjekk-nr">
        Sjekk nr. 0670<br>
        <span id="dato"></span>
      </div>
    </div>

    <div class="linje">
      <span class="etikett">Betalt til</span>
      <span class="verdi" id="mottaker"></span>
    </div>

    <div class="signatur">
      <span class="navn" id="avsender"></span>
      <div class="strek">Underskrift</div>
    </div>

    <div class="micr">⑆110726⑆ ⑈000670⑈ ⑉GRATULERER⑉</div>

    <div class="stempel">Innløst</div>
  </div>
</div>

<div class="teller">
  <div class="tall" id="dager">–</div>
  <div class="tekst">dager som ektefolk</div>
  <div class="jubileum" id="jubileum"></div>
  <p class="hilsen" id="hilsen"></p>
</div>

<script>
document.getElementById('mottaker').textContent = CONFIG.mottaker;
document.getElementById('avsender').textContent = CONFIG.avsender;
document.getElementById('dato').textContent = CONFIG.datoVisning;
document.getElementById('hilsen').textContent = CONFIG.hilsen;

// ---------- Teller ----------
const bryllup = new Date(CONFIG.bryllupsdato + "T12:00:00");
const naa = new Date();
const dager = Math.floor((naa - bryllup) / 86400000);
const dagerEl = document.getElementById('dager');

if (dager < 0) {
  dagerEl.textContent = Math.abs(dager);
  document.querySelector('.teller .tekst').textContent = "dager til bryllupet";
} else {
  dagerEl.textContent = dager.toLocaleString('nb-NO');
}

// Neste bryllupsdag
const nesteJub = new Date(bryllup);
nesteJub.setFullYear(bryllup.getFullYear() + Math.max(1, Math.ceil((naa - bryllup) / (365.25 * 86400000))));
const dagerTilJub = Math.ceil((nesteJub - naa) / 86400000);
const aarNr = nesteJub.getFullYear() - bryllup.getFullYear();
if (dager >= 0) {
  document.getElementById('jubileum').textContent =
    dagerTilJub === 0 ? "🎉 Gratulerer med bryllupsdagen! 🎉"
    : dagerTilJub + " dager til " + aarNr + ". bryllupsdag";
}

// Liten opptelling-animasjon på telleren
if (dager > 0 && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  let vist = 0;
  const steg = Math.max(1, Math.floor(dager / 60));
  const anim = setInterval(() => {
    vist = Math.min(dager, vist + steg);
    dagerEl.textContent = vist.toLocaleString('nb-NO');
    if (vist >= dager) clearInterval(anim);
  }, 16);
}
</script>
</body>
</html>
