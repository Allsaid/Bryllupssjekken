<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryllupssjekk</title>
<!-- ================================================================
     BRYLLUPSSJEKK – innstillinger
     1) Fyll inn verdiene under (behold anførselstegn og komma).
     2) Publiser, og åpne siden med ?lag-hash=svaret bakerst i
        adressen for å få hashen til svarHash. Lim inn og publiser
        på nytt. Eksempel:
        https://allsaid.github.io/Bryllupssjekken/?lag-hash=paris
     ================================================================ -->
<script>
const CONFIG = {
  mottaker: "Marie & Christian",
  belop: "2 000",
  valuta: "kr",
  avsender: "Said",                      // ditt navn / dere som gir
  dato: "11.07.2026",                    // bryllupsdatoen
  melding: "Gratulerer med dagen!",      // memo-linjen på sjekken
  ntfyTopic: "bryllupssjekken-oiri975A",
  fallbackTlf: "",            // ditt nummer (SMS-reserve). Tom streng "" for å skjule.
  sporsmal: "Feriested i Danmark hvor mini-golf rekorder ble satt",  // spørsmål bare brudeparet kan
  svarHash: "Skallerup"                           // limes inn fra ?lag-hash – tom = ingen sjekk
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Courier+Prime&family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root {
    --papir: #fdfaf2;
    --papir-kant: #efe7d3;
    --blekk: #1d4f4a;
    --blekk-lys: #3a7a72;
    --gull: #b6922e;
    --tekst: #2b2b28;
    --stempel: #b03a36;
    --bakgrunn: #123734;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bakgrunn);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.06), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(182,146,46,0.10), transparent 55%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 48px;
    font-family: 'Cormorant Garamond', serif;
    color: var(--tekst);
  }

  .intro {
    color: #e9e2cf;
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .intro .eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gull);
    display: block;
    margin-bottom: 10px;
  }
  .intro h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 600;
    font-style: italic;
  }

  /* ------------------ Sjekken ------------------ */
  .sjekk-wrap { perspective: 1200px; width: 100%; max-width: 620px; }

  .sjekk {
    position: relative;
    background: var(--papir);
    border: 1px solid var(--papir-kant);
    border-radius: 6px;
    padding: 26px 30px 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.45), 0 2px 0 rgba(255,255,255,0.15) inset;
    overflow: hidden;
    animation: land 0.9s cubic-bezier(.2,.8,.25,1) both;
  }
  @keyframes land {
    from { opacity: 0; transform: rotateX(18deg) translateY(40px); }
    to   { opacity: 1; transform: rotateX(0) translateY(0); }
  }

  /* Guilloche-aktig bakgrunnsmønster */
  .sjekk::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-radial-gradient(circle at 0% 50%, transparent 0 9px, rgba(29,79,74,0.05) 9px 10px),
      repeating-radial-gradient(circle at 100% 50%, transparent 0 9px, rgba(29,79,74,0.05) 9px 10px);
    pointer-events: none;
  }

  .sjekk-topp {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid var(--blekk);
    padding-bottom: 10px;
    margin-bottom: 18px;
    position: relative;
  }
  .bank-navn {
    font-weight: 700;
    font-size: 20px;
    color: var(--blekk);
    letter-spacing: 1px;
  }
  .bank-navn small {
    display: block;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--blekk-lys);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .sjekk-nr {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--blekk-lys);
    text-align: right;
  }

  .linje {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
    position: relative;
  }
  .linje .etikett {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blekk-lys);
    white-space: nowrap;
  }
  .linje .verdi {
    flex: 1;
    border-bottom: 1px solid rgba(29,79,74,0.4);
    font-size: 22px;
    font-weight: 600;
    padding: 0 4px 2px;
    color: var(--tekst);
  }

  .belop-rad { display: flex; gap: 14px; align-items: stretch; margin-bottom: 16px; }
  .belop-rad .linje { flex: 1; margin-bottom: 0; }
  .belop-boks {
    border: 2px solid var(--blekk);
    border-radius: 4px;
    padding: 6px 16px;
    font-size: 26px;
    font-weight: 700;
    color: var(--blekk);
    background: rgba(29,79,74,0.04);
    white-space: nowrap;
    align-self: center;
  }

  .bunn-rad {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
    margin-top: 22px;
  }
  .memo { flex: 1; }
  .signatur {
    flex: 1;
    text-align: center;
  }
  .signatur .navn {
    font-family: 'Sacramento', cursive;
    font-size: 34px;
    color: var(--blekk);
    transform: rotate(-3deg);
    display: inline-block;
    margin-bottom: -6px;
  }
  .signatur .strek {
    border-top: 1px solid rgba(29,79,74,0.4);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blekk-lys);
    padding-top: 4px;
  }

  .micr {
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--blekk);
    margin-top: 18px;
    text-align: center;
    opacity: 0.85;
    user-select: none;
  }

  /* ------------------ Stempel ------------------ */
  .stempel {
    position: absolute;
    top: 50%; left: 50%;
    font-family: 'Courier Prime', monospace;
    font-size: clamp(34px, 8vw, 52px);
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--stempel);
    border: 5px solid var(--stempel);
    border-radius: 8px;
    padding: 6px 22px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) rotate(-12deg) scale(2.6);
    mix-blend-mode: multiply;
    z-index: 5;
  }
  .stempel.vis {
    animation: slamm 0.45s cubic-bezier(.15,1.4,.4,1) forwards;
  }
  @keyframes slamm {
    0%   { opacity: 0; transform: translate(-50%,-50%) rotate(-12deg) scale(2.6); }
    60%  { opacity: 1; transform: translate(-50%,-50%) rotate(-12deg) scale(0.92); }
    100% { opacity: 0.9; transform: translate(-50%,-50%) rotate(-12deg) scale(1); }
  }

  /* ------------------ Knapp, sikkerhetsspørsmål og status ------------------ */
  .handling { margin-top: 30px; text-align: center; width: 100%; max-width: 620px; }

  button.innlos {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--bakgrunn);
    background: linear-gradient(180deg, #e3c766, var(--gull));
    border: none;
    border-radius: 999px;
    padding: 16px 46px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.5) inset;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button.innlos:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.5) inset; }
  button.innlos:active { transform: translateY(1px) scale(0.98); }
  button.innlos:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  button.innlos:disabled { opacity: 0.55; cursor: default; transform: none; }

  .sporsmal {
    margin-top: 20px;
    color: #e9e2cf;
    animation: tone 0.4s ease both;
  }
  @keyframes tone {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .sporsmal .eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gull);
    display: block;
    margin-bottom: 6px;
  }
  .sporsmal p {
    font-size: 21px;
    font-style: italic;
    margin-bottom: 12px;
  }
  .sporsmal .felt-rad {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .sporsmal input {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    padding: 11px 16px;
    border: none;
    border-radius: 999px;
    width: min(300px, 70vw);
    text-align: center;
    background: var(--papir);
    color: var(--tekst);
  }
  .sporsmal input:focus-visible { outline: 3px solid var(--gull); }
  button.innlos.liten { font-size: 18px; padding: 11px 28px; }

  .status {
    margin-top: 18px;
    color: #e9e2cf;
    font-size: 20px;
    min-height: 30px;
  }
  .status a { color: var(--gull); }

  canvas#konfetti {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  @media (prefers-reduced-motion: reduce) {
    .sjekk, .sporsmal { animation: none; }
    .stempel.vis { animation: none; opacity: 0.9; transform: translate(-50%,-50%) rotate(-12deg) scale(1); }
  }

  @media (max-width: 480px) {
    .sjekk { padding: 20px 16px 16px; }
    .linje .verdi { font-size: 18px; }
    .belop-rad { flex-direction: column; gap: 10px; }
    .belop-boks { align-self: flex-start; }
    .bunn-rad { flex-direction: column; align-items: stretch; gap: 14px; }
    .micr { font-size: 12px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="intro">
  <span class="eyebrow">Til brudeparet</span>
  <h1>En sjekk til å innløse</h1>
</div>

<div class="sjekk-wrap">
  <div class="sjekk" id="sjekk">
    <div class="sjekk-topp">
      <div class="bank-navn">
        SolaBanken
        <small>Avd. Skadberg &middot; est. i dag</small>
      </div>
      <div class="sjekk-nr">
        Sjekk nr. 0670<br>
        <span id="dato"></span>
      </div>
    </div>

    <div class="linje">
      <span class="etikett">Betal til</span>
      <span class="verdi" id="mottaker"></span>
    </div>

    <div class="belop-rad">
      <div class="linje">
        <span class="etikett">Beløp</span>
        <span class="verdi" id="belopTekst"></span>
      </div>
      <div class="belop-boks" id="belopBoks"></div>
    </div>

    <div class="bunn-rad">
      <div class="memo linje" style="margin-bottom:0">
        <span class="etikett">Memo</span>
        <span class="verdi" id="melding" style="font-style: italic; font-size: 18px;"></span>
      </div>
      <div class="signatur">
        <span class="navn" id="avsender"></span>
        <div class="strek">Underskrift</div>
      </div>
    </div>

    <div class="micr">⑆110726⑆ ⑈000670⑈ ⑉GRATULERER⑉</div>

    <div class="stempel" id="stempel">Innløst</div>
  </div>
</div>

<div class="handling">
  <button class="innlos" id="knapp">Innløs sjekken</button>

  <div class="sporsmal" id="sporsmalBoks" hidden>
    <span class="eyebrow">Sikkerhetskontroll</span>
    <p id="sporsmalTekst"></p>
    <div class="felt-rad">
      <input type="text" id="svarFelt" placeholder="Svar her" autocomplete="off">
      <button class="innlos liten" id="svarKnapp">Svar</button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<canvas id="konfetti"></canvas>

<script>
// ---------- Fyll inn sjekken fra CONFIG ----------
document.getElementById('mottaker').textContent = CONFIG.mottaker;
document.getElementById('belopTekst').textContent = CONFIG.belop + " " + CONFIG.valuta;
document.getElementById('belopBoks').textContent = CONFIG.belop + " " + CONFIG.valuta;
document.getElementById('melding').textContent = CONFIG.melding;
document.getElementById('avsender').textContent = CONFIG.avsender;
document.getElementById('dato').textContent = CONFIG.dato;

// ---------- Hash-hjelpere ----------
async function sha256(tekst) {
  const data = new TextEncoder().encode(tekst.trim().toLowerCase());
  const buf = await crypto.subtle.digest("SHA-256", data);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}

// Hash-generator: åpne siden med ?lag-hash=svaret for å få hashen til CONFIG.svarHash
const lagHash = new URLSearchParams(location.search).get("lag-hash");
if (lagHash) sha256(lagHash).then(h => prompt("Lim denne inn som svarHash i CONFIG:", h));

// ---------- Innløsning med sikkerhetsspørsmål ----------
const knapp = document.getElementById('knapp');
const status = document.getElementById('status');
const stempel = document.getElementById('stempel');
const sporsmalBoks = document.getElementById('sporsmalBoks');
const svarFelt = document.getElementById('svarFelt');

knapp.addEventListener('click', () => {
  if (!CONFIG.svarHash) { innlos(); return; }   // ingen hash satt = hopp over spørsmålet
  knapp.hidden = true;
  document.getElementById('sporsmalTekst').textContent = CONFIG.sporsmal;
  sporsmalBoks.hidden = false;
  svarFelt.focus();
});

document.getElementById('svarKnapp').addEventListener('click', sjekkSvar);
svarFelt.addEventListener('keydown', e => { if (e.key === "Enter") sjekkSvar(); });

async function sjekkSvar() {
  if (await sha256(svarFelt.value) !== CONFIG.svarHash) {
    status.textContent = "Det stemmer ikke helt – banken krever riktig svar 🤨";
    svarFelt.select();
    return;
  }
  sporsmalBoks.hidden = true;
  status.textContent = "";
  innlos();
}

async function innlos() {
  knapp.disabled = true;
  status.textContent = "Sender bud til banken…";

  let ok = false;
  try {
    const res = await fetch("https://ntfy.sh/" + CONFIG.ntfyTopic, {
      method: "POST",
      body: CONFIG.mottaker + " har innløst bryllupssjekken på " + CONFIG.belop + " " + CONFIG.valuta + "! Åpne Vipps og send pengene. 🎉",
      headers: {
        "Title": "Sjekken er innløst!",
        "Priority": "high",
        "Tags": "tada,moneybag"
      }
    });
    ok = res.ok;
  } catch (e) {
    ok = false;
  }

  stempel.classList.add('vis');

  if (ok) {
    status.innerHTML = "Sjekken er innløst! Pengene er på vei via Vipps 🎉";
  } else if (CONFIG.fallbackTlf) {
    const smsBody = encodeURIComponent("Jeg innløser herved bryllupssjekken på " + CONFIG.belop + " " + CONFIG.valuta + "! 💍");
    status.innerHTML = 'Banken sover visst – <a href="sms:' + CONFIG.fallbackTlf + '?body=' + smsBody + '">send bud på SMS i stedet</a> 📨';
  } else {
    status.innerHTML = "Banken sover visst – si ifra til giveren, så ordner det seg 📨";
  }
  skytKonfetti();
}

// ---------- Konfetti (uten eksterne biblioteker) ----------
function skytKonfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('konfetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const farger = ['#b6922e', '#e3c766', '#fdfaf2', '#3a7a72', '#b03a36'];
  const biter = [];
  for (let i = 0; i < 160; i++) {
    biter.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height * 0.55,
      vx: (Math.random() - 0.5) * 14,
      vy: -(Math.random() * 14 + 6),
      w: Math.random() * 8 + 4,
      h: Math.random() * 5 + 3,
      farge: farger[Math.floor(Math.random() * farger.length)],
      rot: Math.random() * Math.PI,
      vrot: (Math.random() - 0.5) * 0.3,
      liv: 1
    });
  }

  function tegn() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let aktive = 0;
    for (const b of biter) {
      b.vy += 0.35;
      b.x += b.vx;
      b.y += b.vy;
      b.rot += b.vrot;
      b.liv -= 0.004;
      if (b.liv <= 0 || b.y > canvas.height + 20) continue;
      aktive++;
      ctx.save();
      ctx.globalAlpha = Math.max(b.liv, 0);
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rot);
      ctx.fillStyle = b.farge;
      ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      ctx.restore();
    }
    if (aktive > 0) requestAnimationFrame(tegn);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(tegn);
}
</script>
</body>
</html>
